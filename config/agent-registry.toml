# Canonical secret-free agent registry for the MultiNexus Discord roster.
# This file is the source-controlled authority for Coordinate's agent registry.
# Host-specific runtime fields (token, token_env, paths, channels, etc.) belong
# in the private per-host agents.toml, not here.
#
# Changing any canonical field requires incrementing [registry].version in the
# same reviewed commit.

[registry]
id = "multinexus.discord"
version = 2

[[executor_definitions]]
id = "claude-code"
provider = "anthropic-claude"
adapter = "claude"
capabilities = ["coding", "review"]

[[executor_definitions]]
id = "codex-code"
provider = "openai-codex"
adapter = "codex"
capabilities = ["coding", "review"]

[[executor_definitions]]
id = "jarvis-code"
provider = "jarvis"
adapter = "jarvis-local"
capabilities = ["coding"]

[[executor_definitions]]
id = "omp-code"
provider = "kimi-code"
adapter = "omp"
capabilities = ["coding", "review"]

[[executor_definitions]]
id = "openclaw-code"
provider = "openclaw"
adapter = "openclaw"
capabilities = ["coding"]

[[executor_definitions]]
id = "opencode-code"
provider = "opencode"
adapter = "opencode"
capabilities = ["coding"]

