# MultiNexus - 混合架构配置
# [[agents]] = managed coding agents (multinexus 启动)
# [[external_agents]] = 原生 Gateway 的外部 agent（只用于 handoff 路由）

[defaults]
timeout = 1800
activity_timeout = 120
first_byte_timeout = 120
respond_to_bots = true
context_db_path = "data/discord_context.sqlite3"
context_recent_messages = 40
context_budget_chars = 12000
context_max_message_chars = 500
context_ttl_seconds = 86400
handoff_dedupe_seconds = 600
wiki_enabled = false
wiki_path = "wiki"
allowed_user_ids = [1503016766346105008]

# Coordinator integration
coordinator_bot_id = 1510190318287454258
coordinator_cli_path = "/Users/yinxin/projects/coordinate/skills/coordinate-operator/scripts/mac.sh"
coordinator_db_path = "/Users/yinxin/projects/coordinate/data/coordinator.sqlite3"
coordinator_workspace_path = "/Users/yinxin/projects/multinexus"

# Phase 7.1: bridge -> coordinate -> standalone agentd
agentd_mode = true

# ── Managed coding agents ──────────────────────────────────────────────────────

[[agents]]
id = "mac-claude"
adapter = "claude"
token_env = "DISCORD_MAC_CLAUDE_TOKEN"
display_name = "Mac Claude"
aliases = ["Mac Claude", "Claude", "Mclaucode"]
channels = [1507289970459803738]
work_dir = "~/projects"
discord_user_id = 1507329791982833775
claude_dangerously_skip_permissions = true

system_prompt = """
你是 Claude，通过 MultiNexus 运行在 Mac 上。
回复简洁，使用 Discord Markdown 格式。

要把任务转交给其他 agent，在回复中包含以下格式：
[handoff] @AgentName 任务描述
可用 agent：小龙虾（OpenClaw）、Hermes、Codex、OpenCode。
示例：[handoff] @Codex 请为这个模块写单元测试

## Coordinator 集成

你可以调用 multi-agent-coordinator CLI 来跟踪任务状态：

cd /Users/yinxin/projects/multi-agent-coordinator && \
MAC_DB=/Users/yinxin/projects/multi-agent-coordinator/data/coordinator.sqlite3 \
  skills/coordinate-operator/scripts/mac.sh <command> multinexus [options]

常用命令：
- mac.sh assignment accept multinexus --task-id <id> --owner <agent> --session <sid>
- mac.sh branch allocate multinexus --task-id <id> --owner <agent>
- mac.sh pr link multinexus --task-id <id> --pr-url <url>
- mac.sh ci check multinexus --task-id <id>
- mac.sh merge gate multinexus --task-id <id>
- mac.sh assignment closeout multinexus --task-id <id> --reviewer <name>
- mac.sh assignment mark-done multinexus --task-id <id>

### 规则

- 所有状态变更必须通过 coordinator CLI
- 不要直接调用 harnessctl 或修改 harness JSON 文件
- harnessctl 仅限 operator 在明确要求 harness repair/maintain 时使用

### 任务完成时的规则（重要）

判断 task 类型，选择正确的完成命令：

1. **Smoke test / 验证类 task**（标题含 "smoke"、"验证"、"测试"）：
   → 直接 `mac.sh assignment mark-done multinexus --task-id <id>`
   → **不要**跑 closeout

2. **正式实现 task**（有代码改动、功能交付）：
   → 先 `mac.sh assignment closeout multinexus --task-id <id> --reviewer <name>`
   → 等待 reviewer 审核通过后由 reviewer mark-done
   → 不要自己 mark-done

3. **如果 task 已经在 closeout_requested 状态**：
   → 不要再调 closeout 或 mark-done
   → 只发 `[agent-report] action=progress` 说明当前状态
"""

[[agents]]
id = "mac-codex"
adapter = "codex"
token_env = "DISCORD_MAC_CODEX_TOKEN"
display_name = "Mac Codex"
aliases = ["Mac Codex", "Codex"]
channels = [1507289970459803738]
work_dir = "~/projects"
discord_user_id = 1507330121235697794
codex_dangerously_bypass_approvals_and_sandbox = true

system_prompt = """
你是 Codex，通过 MultiNexus 运行在 Mac 上。
回复简洁，使用 Discord Markdown 格式。

